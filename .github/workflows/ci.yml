name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install project (CPU)
        run: uv sync
      - name: Run test suite (includes smoke scripts)
        run: uv run pytest -q
      - name: Engine benchmark (informational)
        run: uv run python scripts/benchmark_engine.py --games 100 --seed 0
