# TRIAD hyperparameters — single source for training runs (CLAUDE.md §4.4).
# CLI flags on scripts/train_ppo.py override individual keys.

seed: 0

env:
  n_envs: 64
  shaping_alpha: 0.02        # +alpha * delta-SC at each Winter; 0 = ablation row

ppo:
  # Standard LOCAL budget, fixed by the measured first M3 run (~280 env-steps/s
  # on the 8-core dev box => ~30 min). Spec-scale 2M-step runs go to cloud GPU;
  # rows must always compare runs of equal budget.
  total_steps: 500000
  rollout_len: 128
  lr: 3.0e-4
  anneal_lr: true
  gamma: 1.0                 # finite episodes, terminal-heavy reward
  gae_lambda: 0.95
  clip_coef: 0.2
  update_epochs: 4
  n_minibatches: 8
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  beta_kl: 0.05              # KL(pi_theta || pi_BC); sweep {0, 0.01, 0.05, 0.2}

population:                  # stage 3 (M4+): opponent sampling from a snapshot pool
  enabled: true
  snapshot_every: 5          # updates between pool snapshots
  p_latest: 0.8              # per-seat P(play live theta) vs uniform-past

anchor:
  checkpoint: weights/bc.pt
  init_from_anchor: true     # false + beta_kl 0 = the PPO-from-scratch ablation

eval:
  every_updates: 10
  games: 45
  opponent: grabber
